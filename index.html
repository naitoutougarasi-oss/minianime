<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Animation Studio</title>
  <style>
    :root {
      --panel: #ffffff;
      --line: #d8dce7;
      --text: #1d2433;
      --muted: #667089;
      --accent: #2e6bff;
      --accent-soft: #eaf0ff;
      --danger: #d74c4c;
      --shadow: 0 10px 30px rgba(21, 34, 66, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fafbff 0%, #f2f4f9 100%);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(560px, 1.7fr) minmax(360px, 1fr);
      gap: 18px;
      min-height: 100vh;
      padding: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
    }

    .panel-header h1,
    .panel-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .left,
    .right {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 36px);
    }

    .toolbar,
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .tool-group,
    .control-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      min-height: 54px;
      flex-wrap: wrap;
    }

    .tool-group label,
    .control-group label,
    .check-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tool-buttons,
    .action-row,
    .frame-actions,
    .playback-actions,
    .io-actions {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #bac4da;
    }

    button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.ghost {
      background: #f9faff;
    }

    button.danger {
      color: var(--danger);
      border-color: #f0caca;
      background: #fff7f7;
    }

    input[type="color"] {
      width: 38px;
      height: 38px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    .slider-row {
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .slider-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .canvas-wrap {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(45deg, #eef1f8 25%, transparent 25%),
        linear-gradient(-45deg, #eef1f8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eef1f8 75%),
        linear-gradient(-45deg, transparent 75%, #eef1f8 75%);
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
    }

    .canvas-shell {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .canvas-note {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 3;
      background: rgba(255,255,255,0.92);
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      pointer-events: none;
    }

    canvas {
      display: block;
      border-radius: 14px;
      background: #fff;
      touch-action: none;
      image-rendering: pixelated;
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
      font-size: 13px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
    }

    .frames {
      flex: 1;
      overflow: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 10px;
      background: #fcfdff;
    }

    .frame-card {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .frame-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(31, 51, 90, 0.07);
    }

    .frame-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: #fdfefe;
    }

    .frame-card.dragging {
      opacity: 0.45;
    }

    .frame-card.drop-target {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .thumb {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .frame-meta {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .frame-title {
      font-size: 14px;
      font-weight: 700;
    }

    .frame-info {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fff;
    }

    .hint-box {
      border-top: 1px solid var(--line);
      padding: 14px 18px 18px;
      background: #fff;
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 1fr;
      }

      .left,
      .right {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel left">
      <div class="panel-header">
        <div>
          <h1>作画エリア</h1>
          <div class="sub">ここで描いたものが、そのまま再生画面になる</div>
        </div>
        <div class="info-chip"><span id="modeLabel">編集中</span></div>
      </div>

      <div class="toolbar">
        <div class="tool-group">
          <label>ツール</label>
          <div class="tool-buttons">
            <button id="penTool" class="active">ペン</button>
            <button id="eraserTool">消しゴム</button>
            <button id="fillTool">塗りつぶし</button>
          </div>
        </div>

        <div class="tool-group">
          <label for="colorPicker">色</label>
          <input type="color" id="colorPicker" value="#111111" />
        </div>

        <div class="tool-group">
          <label for="brushSize">太さ</label>
          <input type="range" id="brushSize" min="1" max="40" value="6" />
          <span id="brushValue">6</span>
        </div>

        <div class="tool-group">
          <label class="check-label"><input type="checkbox" id="onionToggle" checked /> オニオンスキン</label>
        </div>

        <div class="tool-group">
          <label for="onionOpacity">濃さ</label>
          <input type="range" id="onionOpacity" min="0" max="80" value="25" />
          <span id="onionValue">25%</span>
        </div>

        <div class="tool-group">
          <button id="clearCanvas" class="ghost">キャンバスを消去</button>
          <button id="importImageBtn" class="ghost">画像を取り込む</button>
          <input id="importImageInput" type="file" accept="image/*" hidden />
        </div>
      </div>

      <div class="canvas-wrap">
        <div class="canvas-shell">
          <div class="canvas-note" id="canvasNote">フレームを選んで描く</div>
          <canvas id="drawCanvas" width="512" height="512"></canvas>
        </div>
      </div>

      <div class="statusbar">
        <span id="toolStatus">現在のツール: ペン</span>
        <span id="playbackInfo">再生速度: 8 fps</span>
        <span>512 × 512 px</span>
      </div>
    </section>

    <section class="panel right">
      <div class="panel-header">
        <div>
          <h2>フレームと再生</h2>
          <div class="sub">再生速度は全フレーム共通。別画面プレビューにも同期する</div>
        </div>
      </div>

      <div class="controls">
        <div class="frame-actions">
          <button id="addFrame">現在の絵を保存</button>
          <button id="newBlankFrame" class="ghost">空のフレームを追加</button>
          <button id="updateFrame" class="ghost">選択中のフレームを上書き</button>
          <button id="duplicateFrame" class="ghost">複製</button>
          <button id="deleteFrame" class="danger">削除</button>
        </div>

        <div class="slider-row">
          <div class="slider-head">
            <span>全体の再生速度</span>
            <strong id="fpsValue">8 fps</strong>
          </div>
          <input type="range" id="fpsSlider" min="1" max="24" step="1" value="8" />
          <div class="sub" id="frameDurationInfo">1 コマあたり 125 ms</div>
        </div>

        <div class="playback-actions">
          <button id="playBtn">再生</button>
          <button id="stopBtn" class="ghost">停止</button>
          <button id="openPreviewWindowBtn" class="ghost">別画面プレビューを開く</button>
        </div>

        <div class="io-actions">
          <button id="saveProject" class="ghost">JSON 保存</button>
          <button id="loadProjectBtn" class="ghost">JSON 読み込み</button>
          <button id="exportSprites" class="ghost">連番 PNG 書き出し</button>
          <input id="loadProjectInput" type="file" accept="application/json" hidden />
        </div>
      </div>

      <div class="frames" id="framesContainer">
        <div class="empty">まだフレームがない。左で描いてから「現在の絵を追加」を押す。</div>
      </div>

      <div class="hint-box">
        <div>・左のキャンバス自体が再生面。再生すると、その場で動く。</div>
        <div>・「現在の絵を保存」で現フレームを保存し、「空のフレームを追加」で白紙の新規フレームを作れる。</div>
        <div>・右のフレーム一覧はドラッグ＆ドロップで並べ替えできる。</div>
      </div>
    </section>
  </div>

  <script>
    const drawCanvas = document.getElementById('drawCanvas');
    const ctx = drawCanvas.getContext('2d', { willReadFrequently: true });

    const editorCanvas = document.createElement('canvas');
    editorCanvas.width = drawCanvas.width;
    editorCanvas.height = drawCanvas.height;
    const editorCtx = editorCanvas.getContext('2d', { willReadFrequently: true });

    const penTool = document.getElementById('penTool');
    const eraserTool = document.getElementById('eraserTool');
    const fillTool = document.getElementById('fillTool');
    const colorPicker = document.getElementById('colorPicker');
    const brushSize = document.getElementById('brushSize');
    const brushValue = document.getElementById('brushValue');
    const clearCanvasBtn = document.getElementById('clearCanvas');
    const importImageBtn = document.getElementById('importImageBtn');
    const importImageInput = document.getElementById('importImageInput');
    const toolStatus = document.getElementById('toolStatus');
    const playbackInfo = document.getElementById('playbackInfo');
    const modeLabel = document.getElementById('modeLabel');
    const canvasNote = document.getElementById('canvasNote');

    const onionToggle = document.getElementById('onionToggle');
    const onionOpacity = document.getElementById('onionOpacity');
    const onionValue = document.getElementById('onionValue');

    const addFrameBtn = document.getElementById('addFrame');
    const newBlankFrameBtn = document.getElementById('newBlankFrame');
    const updateFrameBtn = document.getElementById('updateFrame');
    const duplicateFrameBtn = document.getElementById('duplicateFrame');
    const deleteFrameBtn = document.getElementById('deleteFrame');
    const fpsSlider = document.getElementById('fpsSlider');
    const fpsValue = document.getElementById('fpsValue');
    const frameDurationInfo = document.getElementById('frameDurationInfo');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const openPreviewWindowBtn = document.getElementById('openPreviewWindowBtn');
    const framesContainer = document.getElementById('framesContainer');
    const saveProjectBtn = document.getElementById('saveProject');
    const loadProjectBtn = document.getElementById('loadProjectBtn');
    const loadProjectInput = document.getElementById('loadProjectInput');
    const exportSpritesBtn = document.getElementById('exportSprites');

    let tool = 'pen';
    let drawing = false;
    let frames = [];
    let selectedFrameIndex = -1;
    let playTimeout = null;
    let isPlaying = false;
    let currentPlaybackIndex = 0;
    let fps = Number(fpsSlider.value);
    let previewWindow = null;
    let draggedFrameIndex = null;

    function makeFrame(dataURL) {
      const img = new Image();
      img.onload = () => {
        if (isPlaying) {
          renderPlaybackFrame(currentPlaybackIndex);
        } else {
          renderEditor();
        }
        syncPreviewWindow();
      };
      img.src = dataURL;
      return { image: dataURL, img };
    }

    function clearContext(targetCtx, targetCanvas) {
      targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
      targetCtx.fillStyle = '#ffffff';
      targetCtx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
    }

    function clearEditor() {
      editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
    }

    function drawFrameObject(frame, targetCtx, alpha = 1) {
      if (!frame || !frame.img) return;
      if (!frame.img.complete) return;
      targetCtx.save();
      targetCtx.globalAlpha = alpha;
      targetCtx.drawImage(frame.img, 0, 0, drawCanvas.width, drawCanvas.height);
      targetCtx.restore();
    }

    function renderToExternalCanvas(targetCanvas, targetCtx, sourceCanvas) {
      if (!targetCanvas || !targetCtx || !sourceCanvas) return;
      clearContext(targetCtx, targetCanvas);
      targetCtx.drawImage(sourceCanvas, 0, 0, targetCanvas.width, targetCanvas.height);
    }

    function getPreviewContext() {
      if (!previewWindow || previewWindow.closed) {
        previewWindow = null;
        return null;
      }
      const previewCanvas = previewWindow.document.getElementById('previewCanvas');
      if (!previewCanvas) return null;
      return {
        canvas: previewCanvas,
        ctx: previewCanvas.getContext('2d')
      };
    }

    function syncPreviewWindow() {
      const preview = getPreviewContext();
      if (!preview) return;
      renderToExternalCanvas(preview.canvas, preview.ctx, drawCanvas);

      const info = previewWindow.document.getElementById('previewInfo');
      if (info) {
        const state = isPlaying ? `再生中 ${fps} fps` : `停止中 ${fps} fps`;
        info.textContent = state;
      }
    }

    function openPreviewWindow() {
      if (previewWindow && !previewWindow.closed) {
        previewWindow.focus();
        syncPreviewWindow();
        return;
      }

      previewWindow = window.open('', 'simple-animation-preview', 'width=760,height=820');
      if (!previewWindow) {
        alert('別画面を開けなかった。ポップアップを許可してほしい。');
        return;
      }

      previewWindow.document.write(`<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Animation Preview</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #f7f9ff 0%, #eef2f9 100%);
      font-family: Inter, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      color: #1d2433;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .shell {
      background: #ffffff;
      border: 1px solid #d8dce7;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(21, 34, 66, 0.08);
      width: min(92vw, 720px);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #667089;
      flex-wrap: wrap;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      border: 1px solid #d8dce7;
      background: #fff;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <strong>別画面プレビュー</strong>
      <span id="previewInfo">停止中</span>
    </div>
    <canvas id="previewCanvas" width="512" height="512"></canvas>
  </div>
</body>
</html>`);
      previewWindow.document.close();
      previewWindow.addEventListener('beforeunload', () => {
        previewWindow = null;
      });
      syncPreviewWindow();
    }

    function initCanvases() {
      clearContext(ctx, drawCanvas);
      clearEditor();
      renderEditor();
      updateFpsUI();
    }

    function setTool(nextTool) {
      tool = nextTool;
      [penTool, eraserTool, fillTool].forEach(btn => btn.classList.remove('active'));
      if (tool === 'pen') penTool.classList.add('active');
      if (tool === 'eraser') eraserTool.classList.add('active');
      if (tool === 'fill') fillTool.classList.add('active');

      const label = tool === 'pen' ? 'ペン' : tool === 'eraser' ? '消しゴム' : '塗りつぶし';
      toolStatus.textContent = `現在のツール: ${label}`;
    }

    function updateCanvasNote() {
      if (isPlaying) {
        canvasNote.textContent = '再生中';
        return;
      }
      if (selectedFrameIndex >= 0) {
        canvasNote.textContent = `フレーム ${selectedFrameIndex + 1} を編集中`;
      } else {
        canvasNote.textContent = '未保存の新規フレームを編集中';
      }
    }

    function getPointerPosition(event) {
      const rect = drawCanvas.getBoundingClientRect();
      const scaleX = drawCanvas.width / rect.width;
      const scaleY = drawCanvas.height / rect.height;
      return {
        x: Math.floor((event.clientX - rect.left) * scaleX),
        y: Math.floor((event.clientY - rect.top) * scaleY)
      };
    }

    function drawDot(x, y) {
      editorCtx.save();
      editorCtx.beginPath();
      editorCtx.arc(x, y, Number(brushSize.value) / 2, 0, Math.PI * 2);
      if (tool === 'eraser') {
        editorCtx.globalCompositeOperation = 'destination-out';
        editorCtx.fillStyle = 'rgba(0,0,0,1)';
      } else {
        editorCtx.globalCompositeOperation = 'source-over';
        editorCtx.fillStyle = colorPicker.value;
      }
      editorCtx.fill();
      editorCtx.restore();
      renderEditor();
    }

    function drawLine(fromX, fromY, toX, toY) {
      editorCtx.save();
      editorCtx.beginPath();
      editorCtx.moveTo(fromX, fromY);
      editorCtx.lineTo(toX, toY);
      editorCtx.lineCap = 'round';
      editorCtx.lineJoin = 'round';
      editorCtx.lineWidth = Number(brushSize.value);
      if (tool === 'eraser') {
        editorCtx.globalCompositeOperation = 'destination-out';
        editorCtx.strokeStyle = 'rgba(0,0,0,1)';
      } else {
        editorCtx.globalCompositeOperation = 'source-over';
        editorCtx.strokeStyle = colorPicker.value;
      }
      editorCtx.stroke();
      editorCtx.restore();
      renderEditor();
    }

    function startDrawing(event) {
      if (isPlaying) return;
      const pos = getPointerPosition(event);
      if (tool === 'fill') {
        floodFill(pos.x, pos.y, hexToRgba(colorPicker.value));
        renderEditor();
        return;
      }
      drawing = true;
      drawCanvas.dataset.lastX = pos.x;
      drawCanvas.dataset.lastY = pos.y;
      drawDot(pos.x, pos.y);
    }

    function moveDrawing(event) {
      if (!drawing || isPlaying) return;
      const pos = getPointerPosition(event);
      const lastX = Number(drawCanvas.dataset.lastX);
      const lastY = Number(drawCanvas.dataset.lastY);
      drawLine(lastX, lastY, pos.x, pos.y);
      drawCanvas.dataset.lastX = pos.x;
      drawCanvas.dataset.lastY = pos.y;
    }

    function stopDrawing() {
      drawing = false;
    }

    function hexToRgba(hex) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      const r = bigint >> 16 & 255;
      const g = bigint >> 8 & 255;
      const b = bigint & 255;
      return [r, g, b, 255];
    }

    function colorMatch(data, index, target) {
      return (
        data[index] === target[0] &&
        data[index + 1] === target[1] &&
        data[index + 2] === target[2] &&
        data[index + 3] === target[3]
      );
    }

    function floodFill(startX, startY, fillColor) {
      const imageData = editorCtx.getImageData(0, 0, editorCanvas.width, editorCanvas.height);
      const data = imageData.data;
      const width = imageData.width;
      const height = imageData.height;
      const startIndex = (startY * width + startX) * 4;
      const targetColor = [
        data[startIndex],
        data[startIndex + 1],
        data[startIndex + 2],
        data[startIndex + 3]
      ];

      if (
        targetColor[0] === fillColor[0] &&
        targetColor[1] === fillColor[1] &&
        targetColor[2] === fillColor[2] &&
        targetColor[3] === fillColor[3]
      ) {
        return;
      }

      const stack = [[startX, startY]];
      while (stack.length) {
        const point = stack.pop();
        const x = point[0];
        const y = point[1];
        if (x < 0 || y < 0 || x >= width || y >= height) continue;
        const index = (y * width + x) * 4;
        if (!colorMatch(data, index, targetColor)) continue;

        data[index] = fillColor[0];
        data[index + 1] = fillColor[1];
        data[index + 2] = fillColor[2];
        data[index + 3] = fillColor[3];

        stack.push([x + 1, y]);
        stack.push([x - 1, y]);
        stack.push([x, y + 1]);
        stack.push([x, y - 1]);
      }

      editorCtx.putImageData(imageData, 0, 0);
    }

    function snapshotEditorCanvas() {
      return editorCanvas.toDataURL('image/png');
    }

    function createBlankFrameDataURL() {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = editorCanvas.width;
      tempCanvas.height = editorCanvas.height;
      return tempCanvas.toDataURL('image/png');
    }

    function loadDataURLIntoEditor(dataURL) {
      const img = new Image();
      img.onload = () => {
        clearEditor();
        editorCtx.drawImage(img, 0, 0, editorCanvas.width, editorCanvas.height);
        renderEditor();
      };
      img.src = dataURL;
    }

    function loadFrameIntoEditor(index) {
      if (index < 0 || index >= frames.length) return;
      selectedFrameIndex = index;
      loadDataURLIntoEditor(frames[index].image);
      renderFrames();
      updateCanvasNote();
    }

    function getOnionAlpha() {
      return Number(onionOpacity.value) / 100;
    }

    function renderEditor() {
      if (isPlaying) return;
      clearContext(ctx, drawCanvas);

      ctx.drawImage(editorCanvas, 0, 0, drawCanvas.width, drawCanvas.height);

      if (onionToggle.checked && selectedFrameIndex >= 0) {
        drawFrameObject(frames[selectedFrameIndex - 1], ctx, getOnionAlpha());
        drawFrameObject(frames[selectedFrameIndex + 1], ctx, getOnionAlpha() * 0.8);
      }

      updateCanvasNote();
      syncPreviewWindow();
    }

    function getCurrentDisplayFrame() {
      return null;
    }

    function renderFrames() {
      if (!frames.length) {
        framesContainer.innerHTML = '<div class="empty">まだフレームがない。左で描いてから保存するか、空のフレームを追加する。</div>';
        return;
      }

      framesContainer.innerHTML = '';
      frames.forEach((frame, index) => {
        const card = document.createElement('div');
        card.className = 'frame-card' + (index === selectedFrameIndex ? ' selected' : '');
        card.draggable = true;
        card.innerHTML = `
          <img class="thumb" src="${frame.image}" alt="frame ${index + 1}" />
          <div class="frame-meta">
            <div class="frame-title">フレーム ${index + 1}</div>
            <div class="frame-info">クリックで選択 / 編集</div>
            <div class="frame-info">ドラッグで移動 / 共通再生速度: ${fps} fps</div>
          </div>
        `;

        card.addEventListener('click', () => loadFrameIntoEditor(index));
        card.addEventListener('dragstart', event => {
          draggedFrameIndex = index;
          card.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', String(index));
        });
        card.addEventListener('dragover', event => {
          event.preventDefault();
          card.classList.add('drop-target');
        });
        card.addEventListener('dragleave', () => {
          card.classList.remove('drop-target');
        });
        card.addEventListener('drop', event => {
          event.preventDefault();
          card.classList.remove('drop-target');
          const fromIndex = draggedFrameIndex ?? Number(event.dataTransfer.getData('text/plain'));
          moveFrame(fromIndex, index);
        });
        card.addEventListener('dragend', () => {
          draggedFrameIndex = null;
          document.querySelectorAll('.frame-card').forEach(node => {
            node.classList.remove('dragging');
            node.classList.remove('drop-target');
          });
        });

        framesContainer.appendChild(card);
      });
    }

    function moveFrame(fromIndex, toIndex) {
      if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0) return;
      if (fromIndex >= frames.length || toIndex >= frames.length) return;

      const movedFrame = frames.splice(fromIndex, 1)[0];
      frames.splice(toIndex, 0, movedFrame);

      if (selectedFrameIndex === fromIndex) {
        selectedFrameIndex = toIndex;
      } else if (selectedFrameIndex > fromIndex && selectedFrameIndex <= toIndex) {
        selectedFrameIndex -= 1;
      } else if (selectedFrameIndex < fromIndex && selectedFrameIndex >= toIndex) {
        selectedFrameIndex += 1;
      }

      renderFrames();
      if (selectedFrameIndex >= 0 && frames[selectedFrameIndex]) {
        updateCanvasNote();
      }
    }

    function addFrame() {
      const frame = makeFrame(snapshotEditorCanvas());
      frames.push(frame);
      selectedFrameIndex = frames.length - 1;
      renderFrames();
      renderEditor();
    }

    function addBlankFrame() {
      const blankFrame = makeFrame(createBlankFrameDataURL());
      frames.push(blankFrame);
      selectedFrameIndex = frames.length - 1;
      loadFrameIntoEditor(selectedFrameIndex);
      renderFrames();
    }

    function updateFrame() {
      if (selectedFrameIndex < 0) {
        alert('上書きするフレームを選んでほしい。');
        return;
      }
      frames[selectedFrameIndex] = makeFrame(snapshotEditorCanvas());
      renderFrames();
      renderEditor();
    }

    function duplicateFrame() {
      if (selectedFrameIndex < 0) {
        alert('複製するフレームを選んでほしい。');
        return;
      }
      const original = frames[selectedFrameIndex];
      frames.splice(selectedFrameIndex + 1, 0, makeFrame(original.image));
      selectedFrameIndex += 1;
      loadFrameIntoEditor(selectedFrameIndex);
      renderFrames();
    }

    function deleteFrame() {
      if (selectedFrameIndex < 0) {
        alert('削除するフレームを選んでほしい。');
        return;
      }
      frames.splice(selectedFrameIndex, 1);
      if (!frames.length) {
        selectedFrameIndex = -1;
        clearEditor();
      } else {
        selectedFrameIndex = Math.min(selectedFrameIndex, frames.length - 1);
        loadFrameIntoEditor(selectedFrameIndex);
      }
      renderFrames();
      renderEditor();
    }

    function updateFpsUI() {
      fpsValue.textContent = `${fps} fps`;
      playbackInfo.textContent = `再生速度: ${fps} fps`;
      frameDurationInfo.textContent = `1 コマあたり ${Math.round(1000 / fps)} ms`;
      renderFrames();
      syncPreviewWindow();
    }

    function renderPlaybackFrame(index) {
      if (!frames.length) return;
      const frame = frames[index];
      clearContext(ctx, drawCanvas);
      drawFrameObject(frame, ctx, 1);
      syncPreviewWindow();
    }

    function stopPlayback() {
      isPlaying = false;
      clearTimeout(playTimeout);
      modeLabel.textContent = '編集中';
      updateCanvasNote();
      renderEditor();
    }

    function playbackStep() {
      if (!isPlaying || !frames.length) return;
      renderPlaybackFrame(currentPlaybackIndex);
      playTimeout = setTimeout(() => {
        currentPlaybackIndex = (currentPlaybackIndex + 1) % frames.length;
        playbackStep();
      }, Math.round(1000 / fps));
    }

    function startPlayback() {
      if (!frames.length) {
        alert('まずフレームを追加してほしい。');
        return;
      }
      clearTimeout(playTimeout);
      isPlaying = true;
      currentPlaybackIndex = 0;
      modeLabel.textContent = '再生中';
      updateCanvasNote();
      playbackStep();
    }

    function saveProject() {
      const payload = {
        version: 2,
        width: drawCanvas.width,
        height: drawCanvas.height,
        fps,
        frames: frames.map(frame => frame.image)
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'animation-project.json';
      link.click();
      URL.revokeObjectURL(url);
    }

    function loadProject(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const json = JSON.parse(reader.result);
          const frameSources = Array.isArray(json.frames)
            ? json.frames.map(frame => typeof frame === 'string' ? frame : frame.image).filter(Boolean)
            : [];
          if (!frameSources.length) throw new Error('invalid format');
          frames = frameSources.map(source => makeFrame(source));
          fps = Number(json.fps) || 8;
          fpsSlider.value = String(fps);
          selectedFrameIndex = 0;
          updateFpsUI();
          renderFrames();
          loadFrameIntoEditor(0);
        } catch (error) {
          alert('JSON の読み込みに失敗した。');
        }
      };
      reader.readAsText(file);
    }

    function exportSprites() {
      if (!frames.length) {
        alert('書き出すフレームがない。');
        return;
      }
      frames.forEach((frame, index) => {
        const link = document.createElement('a');
        link.href = frame.image;
        link.download = `frame-${String(index + 1).padStart(3, '0')}.png`;
        link.click();
      });
    }

    function importImage(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          clearEditor();
          const scale = Math.min(editorCanvas.width / img.width, editorCanvas.height / img.height);
          const drawWidth = img.width * scale;
          const drawHeight = img.height * scale;
          const offsetX = (editorCanvas.width - drawWidth) / 2;
          const offsetY = (editorCanvas.height - drawHeight) / 2;
          editorCtx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
          renderEditor();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    penTool.addEventListener('click', () => setTool('pen'));
    eraserTool.addEventListener('click', () => setTool('eraser'));
    fillTool.addEventListener('click', () => setTool('fill'));

    brushSize.addEventListener('input', () => {
      brushValue.textContent = brushSize.value;
    });

    onionOpacity.addEventListener('input', () => {
      onionValue.textContent = `${onionOpacity.value}%`;
      renderEditor();
    });

    onionToggle.addEventListener('change', renderEditor);

    clearCanvasBtn.addEventListener('click', () => {
      clearEditor();
      renderEditor();
    });

    importImageBtn.addEventListener('click', () => importImageInput.click());
    importImageInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (file) importImage(file);
      event.target.value = '';
    });

    drawCanvas.addEventListener('pointerdown', startDrawing);
    drawCanvas.addEventListener('pointermove', moveDrawing);
    window.addEventListener('pointerup', stopDrawing);
    drawCanvas.addEventListener('pointerleave', stopDrawing);

    addFrameBtn.addEventListener('click', addFrame);
    newBlankFrameBtn.addEventListener('click', addBlankFrame);
    updateFrameBtn.addEventListener('click', updateFrame);
    duplicateFrameBtn.addEventListener('click', duplicateFrame);
    deleteFrameBtn.addEventListener('click', deleteFrame);

    fpsSlider.addEventListener('input', event => {
      fps = Number(event.target.value);
      updateFpsUI();
      if (isPlaying) {
        startPlayback();
      }
    });

    playBtn.addEventListener('click', startPlayback);
    stopBtn.addEventListener('click', stopPlayback);
    openPreviewWindowBtn.addEventListener('click', openPreviewWindow);

    saveProjectBtn.addEventListener('click', saveProject);
    loadProjectBtn.addEventListener('click', () => loadProjectInput.click());
    loadProjectInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (file) loadProject(file);
      event.target.value = '';
    });

    exportSpritesBtn.addEventListener('click', exportSprites);

    setTool('pen');
    initCanvases();
    onionValue.textContent = `${onionOpacity.value}%`;
  </script>
</body>
</html>
